name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --features coolprop-dylib --all-targets -- -W clippy::pedantic -D warnings

      - name: Run tests
        run: |
          # The coolprop-sys-linux-x86-64 build script copies libCoolProp.so
          # into OUT_DIR and sets rpath there. However, the library's SONAME is
          # libCoolProp.so.7, so the runtime linker looks for that filename
          # instead. Create the soname symlink so the linker can find it.
          COOLPROP_OUT_DIR=$(find target/debug/build -path '*/coolprop-sys-linux-x86-64-*/out' -type d)
          ln -sf libCoolProp.so "$COOLPROP_OUT_DIR/libCoolProp.so.7"
          cargo test --features coolprop-dylib
